metricbeat.config:
  modules:
    path: ${path.config}/modules.d/*.yml
    # Reload module configs as they change:
    reload.enabled: false

metricbeat.autodiscover:
  providers:
    - type: docker
      hints.enabled: true

metricbeat.modules:
- module: docker
  metricsets:
    - "container"
    - "cpu"
    - "diskio"
    - "healthcheck"
    - "info"
    - "image"
    - "memory"
    - "network"
  hosts: ["unix:///var/run/docker.sock"]
  period: 10s
  enabled: true
- module: system
  metricsets:
    - cpu
    - load
    - memory
    - network
    - process
    - process_summary
    - uptime
    - socket_summary
    - core
    - diskio
    - filesystem
    - fsstat
    - socket
#    - service
  enabled: true
  period: 10s
  processes: ['.*']
- module: linux
  period: 10s
  metricsets:
    - "pageinfo"
    - "ksm"
    - "conntrack"

processors:
  - add_cloud_metadata: ~
output.elasticsearch:
  hosts: ["https://your.elasticsearch.instance"]
  username: "create-a-user-in-kibana-with appropriate-permissions-then-add-that-info-here"
  password: "see username"
